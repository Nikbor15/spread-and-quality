<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spread &amp; Quality - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, #0f1219 0%, #1a1f2e 100%);
      font-family: 'Inter', system-ui, sans-serif;
    }
    .login-card {
      background: rgba(26, 31, 46, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 36px 40px;
      width: 100%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-brand {
      text-align: center; margin-bottom: 28px;
    }
    .login-brand-title {
      font-size: 22px; font-weight: 700; color: #fff;
      letter-spacing: 0.02em;
    }
    .login-brand-sub {
      font-size: 11.5px; color: #94a3b8;
      margin-top: 4px;
    }
    .login-form { display: flex; flex-direction: column; gap: 14px; }
    .login-field { display: flex; flex-direction: column; gap: 6px; }
    .login-field label {
      font-size: 10.5px; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
    }
    .login-field input {
      background: rgba(15, 18, 25, 0.6);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px;
      padding: 10px 12px;
      color: #e6e9f0; font-size: 13px;
      font-family: inherit;
      transition: border-color 0.15s ease;
    }
    .login-field input:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96,165,250,0.15);
    }
    .login-btn {
      background: #60a5fa;
      color: #0f1219;
      border: none; border-radius: 6px;
      padding: 11px 16px; font-size: 13px; font-weight: 700;
      letter-spacing: 0.02em; cursor: pointer;
      font-family: inherit; margin-top: 8px;
      transition: background 0.15s ease;
    }
    .login-btn:hover { background: #93c5fd; }
    .login-err {
      color: #ef4444;
      background: rgba(239,68,68,0.08);
      border-left: 3px solid #ef4444;
      padding: 8px 12px;
      font-size: 11.5px; border-radius: 0 4px 4px 0;
      margin-top: 6px;
    }
    .login-footer {
      font-size: 10px; color: #64748b;
      text-align: center; margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-title">Spread &amp; Quality</div>
      <div class="login-brand-sub">Credito Privado - Renda Fixa</div>
    </div>
    <form class="login-form" method="POST" action="/login">
      <div class="login-field">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>
      </div>
      <div class="login-field">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      {% if error %}<div class="login-err">{{ error }}</div>{% endif %}
      <button class="login-btn" type="submit">Entrar</button>
    </form>
    <div class="login-footer">Acesso restrito - mesa institucional</div>
  </div>
</body>
</html>
